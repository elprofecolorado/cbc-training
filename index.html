<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CBC Training</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --gold: #c9952a; --black: #0a0a0a; --dark: #1a1a1a; --white: #f0ede8; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Montserrat',sans-serif; background:var(--black); color:var(--white); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.header { background: #000; border-bottom: 1px solid var(--gold); padding: 15px; display: flex; align-items:center; justify-content: space-between; }
.main { flex:1; overflow-y:auto; padding:20px; }
.card { background: var(--dark); border-radius:12px; padding:15px; margin-bottom:15px; border: 1px solid #333; }
.btn { width:100%; padding:15px; border-radius:10px; font-weight:700; border:none; cursor:pointer; text-transform:uppercase; margin-top:10px; }
.btn-gold { background: var(--gold); color: #000; }
input { width:100%; background:#222; border:1px solid #444; color:white; padding:15px; border-radius:8px; margin-bottom:15px; text-align:center; font-size:20px; }
#login-screen { position:fixed; inset:0; background:#000; z-index:9000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
</style>
</head>
<body>

<div id="login-screen">
    <h1 style="font-family:'Bebas Neue'; color:var(--gold); font-size:40px; margin-bottom:30px;">CBC TRAINING</h1>
    <input id="pin-input" type="password" inputmode="numeric" placeholder="PIN">
    <button onclick="doLogin()" class="btn btn-gold">ENTRAR</button>
    <p id="error-msg" style="color:red; margin-top:15px; display:none;"></p>
</div>

<div class="header">
    <div style="font-family:'Bebas Neue'; color:var(--gold); font-size:24px;">COACH PANEL</div>
    <button onclick="location.reload()" style="background:none; border:none; color:white;">Cerrar 🚪</button>
</div>

<div class="main" id="app-content">
    </div>

<script>
// TUS DATOS DE SUPABASE (VALIDADOS)
const S_URL = 'https://btdtpruxntodjuzomdcq.supabase.co';
const S_KEY = 'sb_publishable_NA4niv3lN1R5OUkwJH8ihA_d547f1h4';
const sb = supabase.createClient(S_URL, S_KEY);

async function doLogin() {
    const pin = document.getElementById('pin-input').value;
    const err = document.getElementById('error-msg');
    
    // TRUCO: Si el PIN es 1234, entra directo sin consultar la nube (para evitar bloqueos)
    if(pin === "1234") {
        document.getElementById('login-screen').style.display = 'none';
        showCoach();
        return;
    }

    // Si es otro PIN, busca al alumno
    try {
        const { data, error } = await sb.from('training_clients').select('*').eq('pin', pin).single();
        if(data) {
            document.getElementById('login-screen').style.display = 'none';
            showClient(data);
        } else {
            err.innerText = "PIN incorrecto";
            err.style.display = 'block';
        }
    } catch(e) {
        err.innerText = "Error de conexión";
        err.style.display = 'block';
    }
}

async function showCoach() {
    const content = document.getElementById('app-content');
    content.innerHTML = "Cargando alumnos...";
    
    const { data: clients } = await sb.from('training_clients').select('*');
    
    let html = `<button class="btn btn-gold" onclick="addClient()">+ NUEVO ALUMNO</button><br><br>`;
    if(clients && clients.length > 0) {
        clients.forEach(c => {
            html += `<div class="card" onclick="alert('Editando a: '+ '${c.name}')">
                        <strong>${c.name.toUpperCase()}</strong><br>
                        <small style="color:var(--gold)">PIN: ${c.pin}</small>
                     </div>`;
        });
    } else {
        html += "<p>No hay alumnos. Crea el primero arriba.</p>";
    }
    content.innerHTML = html;
}

function addClient() {
    const name = prompt("Nombre del alumno:");
    const pin = prompt("PIN para el alumno (4 números):");
    if(name && pin) {
        sb.from('training_clients').insert([{name, pin}]).then(() => showCoach());
    }
}

async function showClient(u) {
    const content = document.getElementById('app-content');
    content.innerHTML = `<h2>Hola, ${u.name}</h2><p>Cargando tu rutina...</p>`;
    // Aquí iría la carga de rutinas que ya configuramos
}
</script>
</body>
</html>
